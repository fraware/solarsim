name: Release build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install . pyinstaller

      - name: Build
        run: pyinstaller solarsim.spec

      - uses: actions/upload-artifact@v7
        with:
          name: solarsim-windows-exe
          path: dist/solarsim.exe
